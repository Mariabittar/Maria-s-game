<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Brick Breaker!</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        h1 {
            margin-top: 0;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        canvas {
            background: #16213e;
            display: block;
            border: 4px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }
        p {
            color: #a2a8d3;
        }
    </style>
</head>
<body>

    <h1>Smash the Bricks!</h1>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <p>Use Left and Right arrow keys to move the paddle.</p>

    <script>
        // Setup Canvas
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Ball variables
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 2.5;
        let dy = -2.5;
        const ballRadius = 8;

        // Paddle variables
        const paddleHeight = 10;
        const paddleWidth = 75;
        let paddleX = (canvas.width - paddleWidth) / 2;

        // Controls
        let rightPressed = false;
        let leftPressed = false;

        // Brick variables
        const brickRowCount = 4;
        const brickColumnCount = 5;
        const brickWidth = 75;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 30;

        // Score & Lives
        let score = 0;
        let lives = 3;

        // Create Bricks Array
        const bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        // Event Listeners for keys
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);

        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = true;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = false;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = false;
            }
        }

        // Collision detection logic
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            if (score === brickRowCount * brickColumnCount) {
                                alert("YOU WIN, CONGRATS!");
                                document.location.reload();
                            }
                        }
                    }
                }
            }
        }

        // Drawing functions
        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#e94560";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0f3460";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // Make rows different colors
                        if(r === 0) ctx.fillStyle = "#e84545";
                        else if(r === 1) ctx.fillStyle = "#903749";
                        else if(r === 2) ctx.fillStyle = "#53354a";
                        else ctx.fillStyle = "#2b2e4a";
                        
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawScore() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#a2a8d3";
            ctx.fillText("Score: " + score, 8, 20);
        }

        function drawLives() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#a2a8d3";
            ctx.fillText("Lives: " + lives, canvas.width - 65, 20);
        }

        // Main game loop
        function draw() {
            // Clear canvas each frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            drawLives();
            collisionDetection();

            // Wall collisions (left/right)
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            // Wall collisions (top/bottom)
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    // Hit the paddle
                    dy = -dy;
                    // Add a tiny bit of speed every time you hit the paddle to make it harder!
                    dx = dx * 1.05;
                    dy = dy * 1.05;
                } else {
                    // Hit the floor (lose a life)
                    lives--;
                    if (!lives) {
                        alert("GAME OVER");
                        document.location.reload();
                    } else {
                        // Reset ball and paddle
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 2.5;
                        dy = -2.5;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            // Move Paddle
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            // Update Ball Position
            x += dx;
            y += dy;

            requestAnimationFrame(draw);
        }

        // Start the game loop
        draw();
    </script>
</body>
</html>
